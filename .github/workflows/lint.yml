name: Snakemake Pipeline Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8" "pytest"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install Bowtie2 Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y bowtie2

      - name: Install Chromap Aligner
        run: |
          micromamba create -y -p /tmp/chromap_env -c bioconda -c conda-forge chromap
          echo "/tmp/chromap_env/bin" >> $GITHUB_PATH

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      - name: Lint Workflow
        run: |
          snakemake --lint

      - name: Run Config Validation Tests
        run: |
          pytest rules/scripts/test_validate_config.py

      - name: Validate Workflow (Dry-run)
        run: |
          snakemake -n --use-conda --conda-frontend mamba --profile profiles/test

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install Bowtie2 Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y bowtie2

      - name: Install Chromap Aligner
        run: |
          micromamba create -y -p /tmp/chromap_env -c bioconda -c conda-forge chromap
          echo "/tmp/chromap_env/bin" >> $GITHUB_PATH

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      - name: Run Pipeline (Test Mode)
        run: |
          snakemake --use-conda --conda-frontend mamba --profile profiles/test \
            --config use_conda=True use_container=False \
            --cores 4 \
            --latency-wait 60

      - name: Verify Output Files (Bulk)
        run: |
          if [ ! -s results/reporting/pipeline_execution_summary.json ]; then echo "Summary JSON missing or empty"; exit 1; fi
          if [ ! -s results/reporting/multiqc/multiqc_report.html ]; then echo "MultiQC report missing or empty"; exit 1; fi
          if [ ! -s results/peak_calling/macs2_peakcall/sample1_peaks.narrowPeak ]; then echo "MACS2 peaks missing or empty"; exit 1; fi
          echo "All critical bulk ATAC-seq outputs verified successfully."

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results/
            logs/
          retention-days: 7

  test-scatac:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    env:
      ATAC_MODE: scatac
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install Bowtie2 Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y bowtie2

      - name: Install Chromap Aligner
        run: |
          micromamba create -y -p /tmp/chromap_env -c bioconda -c conda-forge chromap
          echo "/tmp/chromap_env/bin" >> $GITHUB_PATH

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-scatac-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-scatac-${{ runner.os }}-

      - name: Run Pipeline (scATAC Mode)
        run: |
          snakemake --use-conda --conda-frontend mamba --profile profiles/test \
            --config use_conda=True use_container=False \
            --cores 4 \
            --latency-wait 60

      - name: Verify Output Files (scATAC)
        run: |
          if [ ! -s results/reporting/pipeline_execution_summary.json ]; then echo "Summary JSON missing or empty"; exit 1; fi
          if [ ! -s results/scatac/archr/qc_report/ArchR_full_report.pdf ]; then echo "ArchR QC report missing or empty"; exit 1; fi
          if [ ! -s results/scatac/archr/clusters/cell_clusters.tsv ]; then echo "ArchR clusters missing or empty"; exit 1; fi
          echo "All critical scATAC-seq outputs verified successfully."

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-scatac
          path: |
            results/
            logs/
          retention-days: 7

  test-singularity:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.0

      - name: Enable unprivileged user namespaces
        run: |
          echo "kernel.apparmor_restrict_unprivileged_userns = 0" | sudo tee /etc/sysctl.d/99-userns.conf
          sudo sysctl --system

      - name: Install Bowtie2 Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y bowtie2

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install Chromap Aligner
        run: |
          micromamba create -y -p /tmp/chromap_env -c bioconda -c conda-forge chromap
          echo "/tmp/chromap_env/bin" >> $GITHUB_PATH

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Run Pipeline (Singularity Mode)
        run: |
          snakemake --deployment-method apptainer --profile profiles/test \
            --config use_conda=False use_container=True \
            --cores 4 \
            --latency-wait 60

      - name: Verify Output Files (Bulk)
        run: |
          if [ ! -s results/reporting/pipeline_execution_summary.json ]; then echo "Summary JSON missing or empty"; exit 1; fi
          if [ ! -s results/reporting/multiqc/multiqc_report.html ]; then echo "MultiQC report missing or empty"; exit 1; fi
          if [ ! -s results/peak_calling/macs2_peakcall/sample1_peaks.narrowPeak ]; then echo "MACS2 peaks missing or empty"; exit 1; fi
          echo "All critical bulk ATAC-seq outputs verified successfully."

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-singularity
          path: |
            results/
            logs/
          retention-days: 7

  test-scatac-singularity:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    env:
      ATAC_MODE: scatac
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.0

      - name: Enable unprivileged user namespaces
        run: |
          echo "kernel.apparmor_restrict_unprivileged_userns = 0" | sudo tee /etc/sysctl.d/99-userns.conf
          sudo sysctl --system

      - name: Install Bowtie2 Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y bowtie2

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install Chromap Aligner
        run: |
          micromamba create -y -p /tmp/chromap_env -c bioconda -c conda-forge chromap
          echo "/tmp/chromap_env/bin" >> $GITHUB_PATH

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Run Pipeline (scATAC Singularity Mode)
        run: |
          snakemake --deployment-method apptainer --profile profiles/test \
            --config use_conda=False use_container=True \
            --cores 4 \
            --latency-wait 60

      - name: Verify Output Files (scATAC)
        run: |
          if [ ! -s results/reporting/pipeline_execution_summary.json ]; then echo "Summary JSON missing or empty"; exit 1; fi
          if [ ! -s results/scatac/archr/qc_report/ArchR_full_report.pdf ]; then echo "ArchR QC report missing or empty"; exit 1; fi
          if [ ! -s results/scatac/archr/clusters/cell_clusters.tsv ]; then echo "ArchR clusters missing or empty"; exit 1; fi
          echo "All critical scATAC-seq outputs verified successfully."

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-scatac-singularity
          path: |
            results/
            logs/
          retention-days: 7
