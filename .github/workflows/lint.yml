name: Snakemake Pipeline Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Validate Workflow (Dry-run)
        run: |
          snakemake -n --use-conda --conda-frontend mamba --profile profile/test

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Run Pipeline (Test Mode)
        run: |
          snakemake --use-conda --conda-frontend mamba --profile profile/test \
            --cores 4 \
            --latency-wait 60

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results/
            logs/
          retention-days: 7
