# ==============================================================================
# BDB Genomics — ATAC-seq Framework Configuration
# ==============================================================================
#
# This file is the single source of truth for the BDB-Genomics ATAC-seq
# framework. Every tool, path, resource limit, and QC threshold is declared
# here; the Snakemake rules themselves are stateless wrappers that read
# from this config at runtime.
#
# --- Framework Architecture ---
#
# The pipeline is organised as a six-stage directed acyclic graph (DAG):
#
#   Preprocessing → Alignment → Post-alignment → Metrics & QC
#                                                  ↓
#                                    Visualization ← Peak Calling
#
# An automated QC Gate sits between metrics collection and downstream
# analysis. Samples that fail user-defined thresholds (FRiP, TSS
# enrichment, mapping rate, duplication rate) are flagged before
# expensive peak calling and visualisation steps execute.
#
# --- Modality Switching (bulk ↔ scATAC-seq) ---
#
# The framework is modality-agnostic by design. Switching from bulk
# ATAC-seq to scATAC-seq requires only:
#   1. Swapping the sample sheet (global.samples) to a per-barcode manifest.
#   2. Replacing the aligner block (bowtie2 → chromap / cellranger-atac).
#   3. Adjusting peak caller params (e.g., MACS2 → MACS3 / ArchR / SnapATAC2).
# All downstream stages — QC gating, visualisation, reporting — remain
# unchanged because they operate on standard BAM/BED/bigWig contracts.
#
# --- Design Conventions ---
#
# • YAML anchors (&GENOME_FA, *GENOME_FA, etc.) centralise reference paths.
#   Changing a reference once propagates everywhere automatically.
# • Every tool block follows a uniform schema:
#     input → output → params → threads → resources
# • The boilerplate template at the bottom of this file documents how to
#   add a new tool without modifying existing blocks.
#
# ==============================================================================
# Project Metadata
# ==============================================================================
global:
  samples: "data/fastp/samples.tsv"
  envs:
    main: "envs/main.yaml"
  references:
    genome_fa: &GENOME_FA "data/reference/genome.fa"
    genome_sizes: &GENOME_SIZES "data/reference/genome.chrom.sizes"
    bowtie2_index: &BOWTIE2_INDEX "data/reference/index/genome"
    blacklist: &BLACKLIST "data/reference/ENCODE_blacklist.bed"
    annotation_gtf: &ANNOTATION_GTF "data/reference/annotation.gtf"
    motif_db: &MOTIF_DB "data/motifs/jaspar_vertebrates.meme"
    txdb: &TXDB "TxDb.Hsapiens.UCSC.hg38.knownGene"

# ==============================================================================
# Tool Specific Configurations
# ==============================================================================

# ------------------------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------------------------
fastp:
  # NOTE: No 'input' key here. Raw FASTQ paths are resolved dynamically
  # from the sample sheet defined in global.samples (samples.tsv).
  output: "results/preprocessing/fastp"
  params:
    trim_front1: 5
    trim_front2: 5
    length_required: 30 
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

fastqc:
  input:
    R1: "results/preprocessing/fastp"
    R2: "results/preprocessing/fastp"
  output: "results/preprocessing/fastqc"
  threads: 4
  resources:
    mem_mb: 2000
    time: "00:30:00"

# ------------------------------------------------------------------------------
# Alignment
# ------------------------------------------------------------------------------
bowtie2:
  input: "results/preprocessing/fastp"
  output: "results/alignment/bowtie2"
  params:
    index: *BOWTIE2_INDEX
    sensitive: "--very-sensitive"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

# ------------------------------------------------------------------------------
# Post-alignment
# ------------------------------------------------------------------------------
samtools_sort:
  input:
    unsorted_bam: "results/alignment/bowtie2"
  output:
    sorted_bam: "results/post_alignment/samtools_sort"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

mitoATAC_calculate:
  input: 
    sorted_bam: "results/post_alignment/samtools_sort"
  output: 
    mito_stats: "results/post_alignment/mito-ATAC"
  params: 
    mito_chr: "MT" 
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

remove_mito_reads:
  input:
    sorted_bam: "results/post_alignment/samtools_sort"
  output: 
    noMT_sorted_bam: "results/post_alignment/remove_mito_reads"
  params: 
    mito_chr: "MT"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

samtools_index: 
  input:
    sorted_bam_noMT: "results/post_alignment/remove_mito_reads"
  output:
    index: "results/post_alignment/samtools_index"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

samtools_fixmate:
  input:
    sorted_bam_noMT: "results/post_alignment/remove_mito_reads"
  output:
    sorted_bam_noMT_fixmate: "results/post_alignment/samtools_fixmate"
  threads: 2 
  resources:
    mem_mb: 2000
    time: "00:30:00"

samtools_markdup:
  input:
    sorted_bam_noMT_fixmate: "results/post_alignment/samtools_fixmate"
  output:
    markdup_bam: "results/post_alignment/samtools_markdup"
  params:
    remove_duplicates: "r"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

samtools_index_post_markdup:
  input:
    markdup_bam: "results/post_alignment/samtools_markdup"
  output:
    index: "results/post_alignment/samtools_index/post_markdup"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

samtools_view:
  input:
    markdup_bam: "results/post_alignment/samtools_markdup"
  output:
    filtered_bam: "results/post_alignment/samtools_view"
  params:
    MAPQ: 30
    flags: 3844
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

samtools_index_post_filter:
  input: 
    filtered_bam: "results/post_alignment/samtools_view"
  # NOTE: Output matches input because .bai files must sit beside .bam files.
  output:
    filtered_bam_indexed: "results/post_alignment/samtools_view"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

tn5_shift:
  input:
    filtered_bam: "results/post_alignment/samtools_view"
  output:
    shifted_bam: "results/post_alignment/tn5_shift"
    shifted_bam_index: "results/post_alignment/tn5_shift"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

samtools_stats:
  input:
    filtered_bam: "results/post_alignment/samtools_view"
  output:
    stats: "results/post_alignment/samtools_stats"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

# ------------------------------------------------------------------------------
# Metrics & QC
# ------------------------------------------------------------------------------
fragment_size_analysis: 
  input: 
    metrics: "results/metrics_qc/picard/CollectInsertSizeMetrics"
  output: "results/metrics_qc/fragment_size_analysis" 
  threads: 4
  params:
    min_length: 30
    max_length: 1000
    max_fragment: 1000
  resources:
    mem_mb: 4000
    time: "01:00:00"  

tss_enrichment:
  input: 
    shifted_bam: "results/post_alignment/tn5_shift"
    shifted_bam_index: "results/post_alignment/tn5_shift"
  output: "results/metrics_qc/tss_enrichment"
  script: "rules/scripts/tss_enrichment.R"
  threads: 4
  params:
    txdb: *TXDB
    upstream: 2000
    downstream: 2000
  resources:
    mem_mb: 4000
    time: "01:00:00"

picard:
  alignment_metrics:
    input:
      markdup_bam: "results/post_alignment/samtools_markdup"
    output:
      alignment_metrics: "results/metrics_qc/picard/CollectAlignmentSummaryMetrics"
    params:
      reference_genome: *GENOME_FA
      validation_stringency: "LENIENT"
    resources:
      mem_mb: 4000
      time: "01:00:00"
    threads: 4
  insert_metrics:
    input:
      markdup_bam: "results/post_alignment/samtools_markdup"
    output:
      metrics: "results/metrics_qc/picard/CollectInsertSizeMetrics"
      histogram: "results/metrics_qc/picard/CollectInsertSizeMetrics"
    params:
      M: 0.05
      validation_stringency: "LENIENT"
    resources:
      mem_mb: 4000
      time: "01:00:00"
    threads: 4

# ------------------------------------------------------------------------------
# Visualization
# ------------------------------------------------------------------------------
bedtools_genomecov:
  input:
    shifted_bam: "results/post_alignment/tn5_shift" 
  output: 
    bedgraph: "results/visualization/bedtools_genomecov"
  params:
    extra: "-bg"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

sorted_bedgraph:
  input: 
    bedgraph: "results/visualization/bedtools_genomecov"
  output:
    sorted_bedgraph: "results/visualization/sorted_bedgraph_file"
  params:
    mem_mb: 2000 # Internal memory buffer for the 'sort' command (-S flag)
  threads: 4
  resources:
    mem_mb: 4000 # Total memory allocation for the job scheduler (e.g., SLURM)
    time: "01:00:00"

bigwig:
  input:
    sorted_bedgraph: "results/visualization/sorted_bedgraph_file"
  output:
    bigwig: "results/visualization/bigwig"
  params:
    genome: *GENOME_SIZES
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

correlation_analysis:
  input: 
    bigwig: "results/visualization/bigwig"
  output: "results/visualization/correlation_analysis"
  params: 
    bin_size: 1000
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

normalized_coverage:
  input:
    shifted_bam: "results/post_alignment/tn5_shift"
  output:
    normalized_coverage: "results/visualization/normalized_coverage"
  params:
    method: "CPM"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

heatmap:
  input:
    filtered_peaks: "results/peak_calling/filtered_peaks"
    bigwig: "results/visualization/bigwig" 
  output:
    plot: "results/visualization/heatmap/plot"
    matrix: "results/visualization/heatmap/matrix"
    regions: "results/visualization/heatmap"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"
  params: 
    color: "coolwarm"
    upstream: 3000
    downstream: 3000

# ------------------------------------------------------------------------------
# Peak Calling
# ------------------------------------------------------------------------------
macs2:
  input:
    shifted_bam: "results/post_alignment/tn5_shift"
  output: 
    peaks: "results/peak_calling/macs2_peakcall"
  params:
    genome_size: "hs"
    qvalue: 0.01
    nomodel: "--nomodel"
    format: "BAMPE"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

blacklist_filter:
  input:
    peaks: "results/peak_calling/macs2_peakcall"
  output:
    filtered_peaks: "results/peak_calling/filtered_peaks"
  params:
    blacklist: *BLACKLIST
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

frip_calculation:
  input:
    filtered_peaks: "results/peak_calling/filtered_peaks"
    shifted_bam: "results/post_alignment/tn5_shift"
  output: "results/peak_calling/frip_calculation"
  threads: 4
  resources:
    mem_mb: 2000
    time: "00:15:00"

peak_annotation:
  input:
    filtered_peaks: "results/peak_calling/filtered_peaks"
  output: "results/peak_calling/peak_annotation" 
  params:
    gff: *ANNOTATION_GTF
    genome: *GENOME_FA
    feature_types: "gene, exon, CDS"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

motif_analysis:
  input:
    filtered_peaks: "results/peak_calling/filtered_peaks"
    genome: *GENOME_FA
  output: "results/peak_calling/motif_analysis"
  params:
    motif_db: *MOTIF_DB
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

# ------------------------------------------------------------------------------
# Reporting & QC Metrics
# ------------------------------------------------------------------------------
preseq:
  input: 
    markdup_bam: "results/post_alignment/samtools_markdup"
    markdup_bam_index: "results/post_alignment/samtools_index/post_markdup"
  output:
    predicted_complexity: "results/reporting_qc/preseq"
  threads: 1
  resources:
    mem_mb: 4000
    time: "01:00:00"  

qualimap_bamqc:
  input:
    markdup_bam: "results/post_alignment/samtools_markdup"
  output:
    qc_dir: "results/reporting_qc/qualimap"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

# ==============================================================================
# QC Gate
# ==============================================================================
qc_gate:
  input:
    frip: "results/peak_calling/frip_calculation"
    tss: "results/metrics_qc/tss_enrichment"
    stats: "results/post_alignment/samtools_stats"
  output: "results/qc_gate"
  params:
    min_frip: 0.2
    min_tss_enr: 7.0
    min_mapping_rate: 80.0
    max_duplicate_rate: 20.0
  threads: 1
  resources:
    mem_mb: 1000
    time: "00:10:00"

# ==============================================================================
# Reporting
# ==============================================================================
multiqc:
  input:
    reports_dir: "results/"
  output: "results/reporting/multiqc"
  threads: 2
  resources:
    mem_mb: 4000
    time: "00:30:00"
  params:
    config: "rules/config/multiqc_config.yaml"


# ==============================================================================
# Boilerplate / Template Configuration
# Use this block as a guide when adding new tools to the pipeline.
# ==============================================================================
template_category: # [REPLACE] The broad category folder for your new tool (e.g., 'peak_calling', 'qc')
  template_tool: # [REPLACE] The name of your new tool (e.g., 'macs3', 'homer')
    # [REPLACE] The input directory path. Often points to a previous tool's output directory.
    input: "results/preprocessing/fastp" 
    # [REPLACE] The output directory path where this tool will save its results.
    output: "results/template_category/template_tool"
    # [OPTIONAL] Any specific parameters or flags the tool needs to run.
    params:
      message: "This is a boilerplate template."
    # [REPLACE] Number of CPU threads to allocate to this specific tool.
    threads: 1
    # [REPLACE] Memory and time limits for cluster execution (e.g., Slurm).
    resources:
      mem_mb: 1000
      time: "00:10:00"

