# Snakemake Slurm Profile
# Usage: snakemake --profile profile/slurm

executor: slurm
use-conda: true
conda-frontend: mamba
jobs: 100
printshellcmds: true
reason: true
show-failed-logs: true
keep-going: true
rerun-incomplete: true
restart-times: 1

latency-wait: 60

default-resources:
  mem_mb: 4000
  time: "01:00:00"
  threads: 1
  slurm_partition: "standard"
  slurm_account: "bdb_genomics"
